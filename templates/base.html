<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Court Tracker{% endblock %}</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
    crossorigin="anonymous"
  >
  <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
</head>
<body class="bg-body-tertiary">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary-subtle">
    <div class="container-fluid px-4">
      <a class="navbar-brand fw-semibold" href="/ui">Court Tracker</a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNav"
        aria-controls="mainNav"
        aria-expanded="false"
        aria-label="Näytä navigaatio"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="/ui">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/ui/inquiries">Inquiries</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/ui/cases">Caset</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/ui/requests">Requestit</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/ui#work-queues">Työjonot</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/docs">API Docs</a>
          </li>
        </ul>

        <span class="navbar-text small text-light-emphasis">
          UI v4
        </span>
      </div>
    </div>
  </nav>

  <main class="py-4">
    <div class="container-fluid px-4">
      {% if success_message %}
      <div class="alert alert-success alert-dismissible fade show" role="alert">
        {{ success_message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Sulje"></button>
      </div>
      {% endif %}

      {% if error_message %}
      <div class="alert alert-danger alert-dismissible fade show" role="alert">
        {{ error_message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Sulje"></button>
      </div>
      {% endif %}

      {% block content %}{% endblock %}
    </div>
  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
    crossorigin="anonymous"
  ></script>
</body>
</html>
